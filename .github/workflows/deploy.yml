name: Deploy to JetHost

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version auto-detected from packageManager in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production

      # Write .env from GitHub secrets
      - name: Write .env
        run: |
          {
            echo "NODE_ENV=production"
            echo "TRUST_PROXY=1"
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}"
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            echo "SITE_URL=${{ secrets.SITE_URL }}"
            echo "MASTER_ADMIN_PASSWORD=${{ secrets.MASTER_ADMIN_PASSWORD }}"
            echo "VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}"
            echo "VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}"
          } > .env.production

      # Pack only dist/ + scripts/ + package.json + .env (~18MB total, no node_modules)
      - name: Create deployment archive
        run: |
          tar -czf /tmp/deploy.tar.gz \
            --exclude='*.map' \
            dist/ \
            scripts/ \
            package.json \
            pnpm-lock.yaml \
            .env.production
          echo "Archive size: $(du -sh /tmp/deploy.tar.gz | cut -f1)"

      # Setup SSH key
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.JETHOST_SSH_KEY }}" > ~/.ssh/jethost
          chmod 600 ~/.ssh/jethost
          ssh-keyscan -p "${{ secrets.JETHOST_SSH_PORT }}" \
            "${{ secrets.JETHOST_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      # Upload archive (~18MB, no node_modules)
      - name: Upload archive via scp
        run: |
          scp -i ~/.ssh/jethost \
            -P "${{ secrets.JETHOST_SSH_PORT }}" \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=15 \
            /tmp/deploy.tar.gz \
            "${{ secrets.JETHOST_SSH_USER }}@${{ secrets.JETHOST_SSH_HOST }}:~/deploy.tar.gz"

      # Extract + install deps via cloudlinux-selector + restart
      - name: Deploy on server
        env:
          APP: ${{ secrets.JETHOST_APP_DIR || 'pamporovo-villa' }}
        run: |
          ssh -i ~/.ssh/jethost \
            -p "${{ secrets.JETHOST_SSH_PORT }}" \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=15 \
            "${{ secrets.JETHOST_SSH_USER }}@${{ secrets.JETHOST_SSH_HOST }}" << SSHEOF
              set -e
              APP="${{ secrets.JETHOST_APP_DIR }}"
              APP="\${APP:-pamporovo-villa}"
              REMOTE="\$HOME/\$APP"

              echo "==> Extracting archive"
              cd "\$REMOTE"
              tar -xzf ~/deploy.tar.gz
              rm ~/deploy.tar.gz

              echo "==> Placing .env"
              mv .env.production .env

              echo "==> Creating runtime dirs"
              mkdir -p data/notification-sounds

              echo "==> Installing production deps (cloudlinux-selector)"
              cloudlinux-selector install-modules --json --interpreter nodejs \
                --app-root "\$APP" 2>&1 | tail -3 || true

              echo "==> Syncing database schema"
              "\$HOME/nodevenv/\$APP/22/bin/node" scripts/apply-pending-schema.mjs || true

              echo "==> Restarting app"
              cloudlinux-selector restart --json --interpreter nodejs \
                --app-root "\$APP" 2>/dev/null || true

              echo "=== Deploy complete ==="
          SSHEOF

      - name: Summary
        run: echo "Deployed to ${{ secrets.SITE_URL }}"
