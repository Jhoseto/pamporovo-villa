name: Deploy to JetHost

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production

      # Production-only deps (built on CI — never npm install on JetHost server)
      - name: Install production node_modules
        run: |
          rm -rf node_modules
          pnpm install --prod --frozen-lockfile --ignore-scripts
          echo "node_modules size: $(du -sh node_modules | cut -f1)"

      - name: Write .env
        run: |
          {
            echo "NODE_ENV=production"
            echo "TRUST_PROXY=1"
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}"
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            echo "SITE_URL=${{ secrets.SITE_URL }}"
            echo "MASTER_ADMIN_PASSWORD=${{ secrets.MASTER_ADMIN_PASSWORD }}"
            echo "VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}"
            echo "VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}"
          } > .env.production

      # Two archives — smaller uploads, no server-side npm install
      - name: Create deployment archives
        run: |
          tar -czf /tmp/app.tar.gz \
            --exclude='*.map' \
            dist/ \
            scripts/apply-pending-schema.mjs \
            package.json \
            .env.production
          tar -czf /tmp/deps.tar.gz node_modules/
          echo "app.tar.gz: $(du -sh /tmp/app.tar.gz | cut -f1)"
          echo "deps.tar.gz: $(du -sh /tmp/deps.tar.gz | cut -f1)"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.JETHOST_SSH_KEY }}" > ~/.ssh/jethost
          chmod 600 ~/.ssh/jethost
          ssh-keyscan -p "${{ secrets.JETHOST_SSH_PORT }}" \
            "${{ secrets.JETHOST_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload app archive
        run: |
          scp -i ~/.ssh/jethost \
            -P "${{ secrets.JETHOST_SSH_PORT }}" \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=60 \
            -o ServerAliveInterval=15 \
            /tmp/app.tar.gz \
            "${{ secrets.JETHOST_SSH_USER }}@${{ secrets.JETHOST_SSH_HOST }}:~/app.tar.gz"

      - name: Upload deps archive
        run: |
          scp -i ~/.ssh/jethost \
            -P "${{ secrets.JETHOST_SSH_PORT }}" \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=120 \
            -o ServerAliveInterval=15 \
            /tmp/deps.tar.gz \
            "${{ secrets.JETHOST_SSH_USER }}@${{ secrets.JETHOST_SSH_HOST }}:~/deps.tar.gz"

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/jethost \
            -p "${{ secrets.JETHOST_SSH_PORT }}" \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=15 \
            "${{ secrets.JETHOST_SSH_USER }}@${{ secrets.JETHOST_SSH_HOST }}" << 'SSHEOF'
              set -e
              APP="${{ secrets.JETHOST_APP_DIR }}"
              APP="${APP:-pamporovo-villa}"
              cd "$HOME/$APP"

              echo "==> Extracting app"
              tar -xzf ~/app.tar.gz
              rm ~/app.tar.gz
              mv .env.production .env

              echo "==> Extracting node_modules"
              rm -rf node_modules
              tar -xzf ~/deps.tar.gz
              rm ~/deps.tar.gz

              mkdir -p data/notification-sounds

              echo "==> Syncing database schema"
              "$HOME/nodevenv/$APP/22/bin/node" scripts/apply-pending-schema.mjs || true

              echo "==> Restarting app"
              cloudlinux-selector restart --json --interpreter nodejs \
                --app-root "$APP" 2>/dev/null || true

              echo "=== Deploy complete ==="
          SSHEOF

      - name: Summary
        run: echo "Deployed to ${{ secrets.SITE_URL }}"
