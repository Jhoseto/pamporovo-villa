<!doctype html>
<html lang="bg">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Google Consent Mode v2 — defaults before any analytics load -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        analytics_storage: 'denied',
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        functionality_storage: 'denied',
        personalization_storage: 'denied',
        security_storage: 'granted',
        wait_for_update: 500
      });
    </script>
    <script>
      (function () {
        var path = location.pathname;
        var isAdmin = path === "/admin" || path.startsWith("/admin/");

        if (!isAdmin) {
          var isMobile = window.matchMedia("(max-width: 767px)").matches;

          if (isMobile) {
            var fonts = document.createElement("link");
            fonts.rel = "stylesheet";
            fonts.href =
              "https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap";
            fonts.media = "print";
            fonts.onload = function () {
              fonts.media = "all";
            };
            document.head.appendChild(fonts);
          } else {
            var desktopFonts = document.createElement("link");
            desktopFonts.rel = "stylesheet";
            desktopFonts.href =
              "https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&display=swap";
            desktopFonts.media = "print";
            desktopFonts.onload = function () {
              desktopFonts.media = "all";
            };
            document.head.appendChild(desktopFonts);
          }
          return;
        }

        // The PWA manifest + service worker scope is "/admin/". A page loaded
        // at bare "/admin" is outside that scope and Chrome will NOT offer a
        // real install (only a browser shortcut). Canonicalize immediately.
        if (path === "/admin") {
          location.replace("/admin/" + location.search + location.hash);
          return;
        }

        document.documentElement.dataset.adminPwaBootstrap = "1";

        function addLink(rel, href, extra) {
          var sizePart = extra && extra.sizes ? '[sizes="' + extra.sizes + '"]' : "";
          var mediaPart = extra && extra.media ? '[media="' + extra.media + '"]' : "";
          if (document.querySelector('link[rel="' + rel + '"][href="' + href + '"]' + sizePart + mediaPart)) return;
          var link = document.createElement("link");
          link.rel = rel;
          link.href = href;
          if (extra) {
            for (var key in extra) link.setAttribute(key, extra[key]);
          }
          document.head.appendChild(link);
        }

        function addMeta(name, content) {
          if (document.querySelector('meta[name="' + name + '"]')) return;
          var meta = document.createElement("meta");
          meta.name = name;
          meta.content = content;
          document.head.appendChild(meta);
        }

        // use-credentials: hosting bot-protection (Imunify360) returns 428 for
        // cookie-less requests; manifest fetches omit cookies by default.
        addLink("manifest", "/admin/manifest.webmanifest", { crossorigin: "use-credentials" });
        addLink("apple-touch-icon", "/admin/icons/icon-180.png", { sizes: "180x180" });
        addLink("apple-touch-icon", "/admin/icons/icon-167.png", { sizes: "167x167" });
        addLink("apple-touch-icon", "/admin/icons/icon-152.png", { sizes: "152x152" });
        addLink("apple-touch-startup-image", "/admin/splash/launch-1170x2532.png", {
          media:
            "(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)",
        });
        addLink("apple-touch-startup-image", "/admin/splash/launch-1284x2778.png", {
          media:
            "(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)",
        });
        addLink("apple-touch-startup-image", "/admin/splash/launch-750x1334.png", {
          media:
            "(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)",
        });
        addLink("icon", "/admin/icons/icon-192.png", { type: "image/png", sizes: "192x192" });
        addMeta("apple-mobile-web-app-capable", "yes");
        addMeta("apple-mobile-web-app-title", "PV Админ");
        addMeta("apple-mobile-web-app-status-bar-style", "black-translucent");
        addMeta("mobile-web-app-capable", "yes");
        addMeta("application-name", "PV Админ");
        addMeta("format-detection", "telephone=no");
        addMeta("theme-color", "#efeae1");

        // beforeinstallprompt fires once, often before React mounts — stash it
        // globally so useAdminPwaInstall can pick it up whenever it mounts.
        window.__pvAdminInstallPrompt = null;
        window.addEventListener("beforeinstallprompt", function (e) {
          e.preventDefault();
          window.__pvAdminInstallPrompt = e;
          try {
            window.dispatchEvent(new CustomEvent("pv-admin-install-prompt"));
          } catch (err) {}
        });
        window.addEventListener("appinstalled", function () {
          window.__pvAdminInstallPrompt = null;
          try {
            window.dispatchEvent(new CustomEvent("pv-admin-installed"));
          } catch (err) {}
        });

        if ("serviceWorker" in navigator) {
          window.addEventListener("load", function () {
            navigator.serviceWorker.register("/admin/sw.js", { scope: "/admin/" }).catch(function () {});
          });
        }
      })();
    </script>
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link
      rel="preload"
      as="image"
      href="/photos/hero-mobile.webp"
      type="image/webp"
      fetchpriority="high"
      media="(max-width: 767px)" />
    <link
      rel="preload"
      as="image"
      href="/photos/hero.webp"
      type="image/webp"
      fetchpriority="high"
      media="(min-width: 768px)" />
    <!-- seo:server-inject -->
    <!-- DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://maps.googleapis.com" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>

  <body>
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-[300] focus:rounded focus:bg-white focus:px-4 focus:py-2 focus:text-black">
      Към основното съдържание
    </a>
    <!-- Mobile LCP shell — hero paints before JS; removed after React hero loads -->
    <div id="pv-mobile-lcp" hidden>
      <img
        src="/photos/hero-mobile.webp"
        alt=""
        width="828"
        height="621"
        fetchpriority="high"
        decoding="async" />
    </div>
    <script>
      (function () {
        var path = location.pathname;
        var isAdmin = path === "/admin" || path.startsWith("/admin/");
        var shell = document.getElementById("pv-mobile-lcp");
        if (!shell || isAdmin || !window.matchMedia("(max-width: 767px)").matches) {
          shell && shell.remove();
          return;
        }
        shell.hidden = false;
        window.__pvHideLcpShell = function () {
          var el = document.getElementById("pv-mobile-lcp");
          if (el) el.remove();
          window.__pvHideLcpShell = undefined;
        };
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
